<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · MockForge AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head><body>
<script src="js/api.js"></script><script src="js/ui.js"></script><script>initTheme();</script>
<div class="auth-wrap"><div class="glass auth-card">
  <div class="brand" style="justify-content:center;margin-bottom:20px;"><div class="brand-logo">M</div>MockForge AI</div>
  <h3 style="text-align:center;margin-bottom:6px;">Welcome back</h3>
  <p style="text-align:center;color:var(--muted);">Sign in to your account</p>
  <form id="loginForm">
    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Password</label><input type="password" id="password" class="form-control" required></div>
    <button type="submit" class="btn btn-grad w-100" id="btn">Sign In</button>
  </form>
  <p style="text-align:center;margin-top:16px;color:var(--muted);">No account? <a href="register.html">Register</a></p>
  <p style="text-align:center;"><a href="index.html" style="color:var(--muted);font-size:0.85rem;">← Back home</a></p>
</div></div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-app"></span> Signing in...';
  try {
    const data = await apiFetch('/auth/login', { method:'POST', body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })});
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user', JSON.stringify(data.user));
    toast('Welcome back!');
    setTimeout(()=> location.href='dashboard.html', 600);
  } catch(err) { toast(err.message, 'error'); btn.disabled=false; btn.textContent='Sign In'; }
});
</script></body></html>
