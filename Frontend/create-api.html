<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create API · MockForge AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head><body>
<script src="js/api.js"></script><script src="js/ui.js"></script>
<script>
requireAuth();
const html = `
<div class="page-title">Create Mock API</div>
<div class="page-sub">Define an endpoint, add fields, and generate sample JSON</div>
<div class="row g-3">
  <div class="col-lg-6"><div class="glass" style="padding:22px;">
    <div class="mb-3"><label class="form-label">Endpoint Name</label><input id="ep" class="form-control" placeholder="users"></div>
    <div class="row g-2">
      <div class="col-6"><label class="form-label">Method</label>
        <select id="method" class="form-select"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select>
      </div>
      <div class="col-6"><label class="form-label">Category</label>
        <select id="cat" class="form-select">
          <option>User Management API</option><option>Product API</option><option>Payment API</option>
          <option>Authentication API</option><option>Analytics API</option>
        </select>
      </div>
    </div>
    <hr style="border-color:var(--card-border);">
    <h6>Fields</h6>
    <div id="fields"></div>
    <button class="btn btn-sm btn-outline-light mt-2" onclick="addField()">+ Add Field</button>
    <div class="mt-4 d-flex gap-2">
      <button class="btn btn-grad" onclick="generate()">Generate Preview</button>
      <button class="btn btn-outline-light" onclick="save()">Save API</button>
    </div>
  </div></div>
  <div class="col-lg-6"><div class="glass" style="padding:22px;">
    <h6 style="color:var(--muted);">Mock Response Preview</h6>
    <pre id="preview" class="code-block">{ "info": "Click Generate Preview" }</pre>
  </div></div>
</div>`;
mountShell('create', html);

const TYPES = ['string','integer','float','boolean','array','object'];
function addField(name='', type='string') {
  const id = Math.random().toString(36).slice(2,8);
  const row = document.createElement('div');
  row.className='field-row';
  row.innerHTML = `<input class="form-control fname" placeholder="field name" value="${name}">
    <select class="form-select ftype">${TYPES.map(t=>`<option ${t===type?'selected':''}>${t}</option>`).join('')}</select>
    <button class="btn btn-sm btn-outline-danger" onclick="this.parentNode.remove()">×</button>`;
  document.getElementById('fields').appendChild(row);
}
['id','name','email','status'].forEach((f,i)=>addField(f, ['integer','string','string','string'][i]));

function collect() {
  const fields = [...document.querySelectorAll('#fields .field-row')].map(r=>({
    name: r.querySelector('.fname').value.trim(),
    type: r.querySelector('.ftype').value
  })).filter(f=>f.name);
  return {
    endpoint_name: document.getElementById('ep').value.trim(),
    request_method: document.getElementById('method').value,
    category: document.getElementById('cat').value,
    fields
  };
}
async function generate(){
  try { const d = collect(); if(!d.endpoint_name) return toast('Endpoint required','error');
    const r = await apiFetch('/apis/preview', {method:'POST', body: JSON.stringify(d)});
    document.getElementById('preview').textContent = JSON.stringify(r.mock_response, null, 2);
  } catch(e){ toast(e.message,'error'); }
}
async function save(){
  try { const d = collect(); if(!d.endpoint_name) return toast('Endpoint required','error');
    await apiFetch('/apis', {method:'POST', body: JSON.stringify(d)});
    toast('API saved'); setTimeout(()=>location.href='api-management.html', 600);
  } catch(e){ toast(e.message,'error'); }
}
</script></body></html>
