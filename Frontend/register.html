<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register · MockForge AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head><body>
<script src="js/api.js"></script><script src="js/ui.js"></script><script>initTheme();</script>
<div class="auth-wrap"><div class="glass auth-card">
  <div class="brand" style="justify-content:center;margin-bottom:20px;"><div class="brand-logo">M</div>MockForge AI</div>
  <h3 style="text-align:center;">Create your account</h3>
  <p style="text-align:center;color:var(--muted);">Free forever. No credit card.</p>
  <form id="f">
    <div class="mb-3"><label class="form-label">Full name</label><input id="name" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Email</label><input id="email" type="email" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Password</label><input id="password" type="password" class="form-control" minlength="6" required></div>
    <button class="btn btn-grad w-100" id="btn">Create Account</button>
  </form>
  <p style="text-align:center;margin-top:16px;color:var(--muted);">Already registered? <a href="login.html">Sign in</a></p>
</div></div>
<script>

document.getElementById('f').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('btn');

    const fullName = document.getElementById('name').value;
    const emailVal = document.getElementById('email').value;
    const passwordVal = document.getElementById('password').value;

    console.log('Register detail :', fullName, emailVal, passwordVal);

    try {
        await apiFetch('/auth/register', {
            method: 'POST',
            body: JSON.stringify({
                name: fullName,
                email: emailVal,
                password: passwordVal
            })
        });

        toast('Account created! Please sign in.');
        setTimeout(() => location.href = 'login.html', 800);

    } catch (err) {
        console.error(err);
        toast(err.message, 'error');
    }
});

</script></body></html>
